name: Deploy (Cloud Run)

# Pushed-tag triggered. Use:
#   git tag sga/release/v0.1.0
#   git push origin sga/release/v0.1.0
# 'sga' = sajni-api. The '/' in the tag is fine — git supports it.
on:
  push:
    tags:
      - "sga/release/v*"
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  SERVICE_NAME: sajni-api
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/sajni-api

jobs:
  verify:
    name: Lint, vet, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          unformatted="$(gofmt -l .)"
          [ -z "$unformatted" ] || { echo "::error::gofmt: $unformatted"; exit 1; }
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  deploy:
    name: Build image & roll out
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # Tag pattern is sga/release/vX.Y.Z — the '/' chars aren't valid
      # in OCI image tags, so flatten to vX.Y.Z for the image label.
      - name: Compute image tag
        id: tag
        run: |
          REF="${GITHUB_REF_NAME:-manual}"
          IMAGE_TAG="${REF##*/}"           # vX.Y.Z (or 'manual')
          IMAGE_TAG="${IMAGE_TAG:-manual-${GITHUB_SHA::8}}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          IMAGE="${REGISTRY}/${SERVICE_NAME}:${{ steps.tag.outputs.image_tag }}"
          LATEST="${REGISTRY}/${SERVICE_NAME}:latest"
          docker build -t "$IMAGE" -t "$LATEST" .
          docker push "$IMAGE"
          docker push "$LATEST"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE }}
          # Plain runtime config (not sensitive). GCS_BUCKET comes from
          # a GitHub repo Variable so it can rotate without a secret
          # rewrite. GEMINI_MODEL is pinned in code-config because
          # changes need a deploy anyway.
          env_vars: |
            STORAGE_BACKEND=gcs
            GCS_BUCKET=${{ vars.GCS_BUCKET }}
            GEMINI_MODEL=gemini-2.5-flash
            CLOUD_TASKS_PROJECT=${{ vars.GCP_PROJECT_ID }}
            CLOUD_TASKS_LOCATION=${{ vars.GCP_REGION }}
            CLOUD_TASKS_QUEUE=${{ vars.CLOUD_TASKS_QUEUE }}
          # Everything sensitive (or treated as sensitive) is mounted
          # from Google Secret Manager at start-up. Names on the left
          # are the env vars the Go app reads; names on the right
          # (before `:latest`) are the Secret Manager secret names —
          # they must match what `gcloud secrets list` shows.
          #
          # CORS_ORIGIN / APP_URL / API_BASE_URL / EMAIL_FROM live in
          # Secret Manager too so all runtime config has one home,
          # even though they aren't strictly secret.
          secrets: |
            DATABASE_URL=sajni-database-url:latest
            JWT_SECRET=sajni-jwt-secret:latest
            TMDB_API_KEY=sajni-tmdb-key:latest
            GEMINI_API_KEY=sajni-gemini-key:latest
            LOG_LEVEL=LOG_LEVEL:latest
            CORS_ORIGIN=CORS_ORIGIN:latest
            APP_URL=APP_URL:latest
            API_BASE_URL=API_BASE_URL:latest
            EMAIL_FROM=EMAIL_FROM:latest
            GOOGLE_OAUTH_CLIENT_ID=GOOGLE_OAUTH_CLIENT_ID:latest
            GOOGLE_OAUTH_CLIENT_SECRET=GOOGLE_OAUTH_CLIENT_SECRET:latest
            GITHUB_OAUTH_CLIENT_ID=GITHUB_OAUTH_CLIENT_ID:latest
            GITHUB_OAUTH_CLIENT_SECRET=GITHUB_OAUTH_CLIENT_SECRET:latest
            RESEND_API_KEY=RESEND_API_KEY:latest
            REMINDER_CRON_SECRET=REMINDER_CRON_SECRET:latest
            PRICE_CRON_SECRET=PRICE_CRON_SECRET:latest
          # Cheapest viable Cloud Run config:
          # - min-instances=0     → no idle cost (~1–2s cold start)
          # - max-instances=2     → caps blast radius if traffic spikes
          # - cpu=1, memory=512Mi → smallest tier that handles Go + GCS
          # - concurrency=80      → 80 reqs per instance keeps fleet small
          # - cpu-throttling default-on → only billed during requests
          # - cpu-boost           → free during cold starts, faster wake
          flags: |
            --remove-env-vars=CORS_ORIGIN
            --allow-unauthenticated
            --ingress=all
            --default-url
            --no-use-http2
            --port=8080
            --cpu=1
            --memory=512Mi
            --min-instances=0
            --max-instances=2
            --concurrency=80
            --timeout=60
            --cpu-boost
      - name: Smoke-test /readyz
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} --format='value(status.url)')
          echo "Deployed: $URL"
          for i in 1 2 3 4 5; do
            if curl --fail --silent --max-time 10 "$URL/readyz"; then
              echo "✓ healthy"; exit 0
            fi
            sleep 5
          done
          echo "::error::Service did not become healthy"
          exit 1
